# src-tauri/deny.toml — Rust dependency advisory posture for vire.
#
# vire ships a macOS-only Tauri v2 app (tauri 2.11.2 / wry 0.55.1 / tao 0.35.3).
# Enforcement here is TARGET-SCOPED, not an advisory-ID ignore list:
#
#   [graph].targets is restricted to the shipped Apple targets. The gtk3-rs / glib
#   chain is a Linux/BSD-backend graph (cfg-gated inside muda/tao/wry upstream) and is
#   NOT in the macOS dependency graph — proven by:
#       cargo tree -i glib --target aarch64-apple-darwin   -> "nothing to print"
#       cargo tree -i glib --target x86_64-unknown-linux-gnu -> glib <- atk <- gtk <- {muda,tao} <- tauri
#   so those advisories do not fire here, and the gate reflects exactly what ships.
#
# THE TRIPWIRE: the day a Linux triple is added to [graph].targets (which any Linux
# build requires), the deferred advisories below re-surface and MUST be re-evaluated
# (real upstream fix or an explicit fresh acceptance). Do NOT add a blanket
# [advisories].ignore for those IDs — that would bury the tripwire on a future Linux
# build. See openspec/changes/task-047-tauri-gtk-rustsec-cleanup/{design.md,ops-review.md}.

[graph]
# Shipped Apple targets only. Adding a non-Apple triple is the intended tripwire.
targets = [
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-apple-darwin" },
]

[advisories]
version = 2
# Fail on yanked crates. In version-2 schema every advisory in the evaluated graph is
# an error by default; the Apple-target graph is clean by construction, so no ignore
# entries are needed (and none are permitted for the gtk3-rs cluster — see above).
yanked = "deny"
# Unmaintained advisories are evaluated for the whole graph so the tripwire has teeth
# when a Linux target is added.
unmaintained = "all"
ignore = []  # intentionally empty — Apple-target graph is clean by construction.

# ----------------------------------------------------------------------------------
# DEFERRED ADVISORIES (Linux-only backend, NOT compiled into the shipped macOS .app)
# ----------------------------------------------------------------------------------
# Generated by cross-referencing the locked crate versions in src-tauri/Cargo.lock
# against the RustSec advisory database (github.com/rustsec/advisory-db). The
# cargo-deny / cargo-audit binaries are not installed in the authoring environment
# (missing-dependency policy: no install); the CI gate below runs the real
# `cargo deny check advisories` where cargo-deny is installed.
#
# None of the crates below appear in the aarch64/x86_64-apple-darwin graph, so none
# fire under the [graph].targets scoping above. They are listed for auditability and
# to make the tripwire explicit.
#
#   ID                  Crate (locked ver)      Class          Upstream fix
#   ------------------  ----------------------  -------------  -------------------------------
#   RUSTSEC-2024-0429   glib 0.18.5             unsound        glib >= 0.20.0 (gtk4 ecosystem;
#                                                              gtk3 backend cannot consume it)
#   RUSTSEC-2024-0370   proc-macro-error 1.0.4  unmaintained   none (use manyhow / proc-macro2-diagnostics)
#   RUSTSEC-2024-0411   gdkwayland-sys 0.18.2   unmaintained   none — gtk3-rs EOL (-> gtk4-rs)
#   RUSTSEC-2024-0412   gdk 0.18.2             unmaintained   none — gtk3-rs EOL (-> gtk4-rs)
#   RUSTSEC-2024-0413   atk 0.18.2             unmaintained   none — gtk3-rs EOL (-> gtk4-rs)
#   RUSTSEC-2024-0414   gdkx11-sys 0.18.2      unmaintained   none — gtk3-rs EOL (-> gtk4-rs)
#   RUSTSEC-2024-0415   gtk 0.18.2             unmaintained   none — gtk3-rs EOL (-> gtk4-rs)
#   RUSTSEC-2024-0416   atk-sys 0.18.2         unmaintained   none — gtk3-rs EOL (-> gtk4-rs)
#   RUSTSEC-2024-0417   gdkx11 0.18.2          unmaintained   none — gtk3-rs EOL (-> gtk4-rs)
#   RUSTSEC-2024-0418   gdk-sys 0.18.2         unmaintained   none — gtk3-rs EOL (-> gtk4-rs)
#   RUSTSEC-2024-0419   gtk3-macros 0.18.2     unmaintained   none — gtk3-rs EOL (-> gtk4-rs)
#   RUSTSEC-2024-0420   gtk-sys 0.18.2         unmaintained   none — gtk3-rs EOL (-> gtk4-rs)
#
# Review trigger: revisit this acceptance if (i) a Linux build target is added, or
# (ii) Tauri's Linux backend migrates off GTK3 — at which point glib >= 0.20 becomes
# genuinely in-scope and a real bump + packaged-app QA (SW-3) is required.

[bans]
# Posture: advisories-only gate for now. Multiple-version / ban policy is out of scope
# for TASK-047 (no shipped-crate delta). Defaults apply.
multiple-versions = "allow"

[licenses]
# License policy is out of scope for this advisory-only task; allow-by-default so the
# advisory gate can run standalone without a license inventory. A dedicated license
# policy can be layered in a later task if required.
version = 2
confidence-threshold = 0.8

[sources]
unknown-registry = "deny"
unknown-git = "deny"
